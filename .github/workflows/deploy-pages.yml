name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      # Build VitePress documentation site
      - run: npm run docs:build

      # Build Tasuki demo app with /tasuki/app/ base path
      - run: npm run build:demo

      # Merge: docs site at root, demo app at /app/
      - name: Assemble site
        run: |
          mkdir -p website/.vitepress/dist/app
          cp -r dist/* website/.vitepress/dist/app/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
