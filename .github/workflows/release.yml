name: Release

on:
  push:
    tags:
      - "v[0-9]*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: only maintainers (write access or above) can trigger a release
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    steps:
      - name: Check actor permission
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.actor }}

  verify-version:
    name: Verify version consistency
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check versions match tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' package.json)
          TAURI=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)

          echo "Tag:              $TAG"
          echo "package.json:     $PKG"
          echo "tauri.conf.json:  $TAURI"
          echo "Cargo.toml:       $CARGO"

          MISMATCH=0
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG)"
            MISMATCH=1
          fi
          if [ "$TAURI" != "$TAG" ]; then
            echo "::error::tauri.conf.json version ($TAURI) does not match tag ($TAG)"
            MISMATCH=1
          fi
          if [ "$CARGO" != "$TAG" ]; then
            echo "::error::Cargo.toml version ($CARGO) does not match tag ($TAG)"
            MISMATCH=1
          fi

          if [ "$MISMATCH" -eq 1 ]; then
            echo "::error::Version mismatch detected. Run the 'Version Bump' workflow first."
            exit 1
          fi
          echo "All versions match tag v$TAG"

  test:
    name: Lint & Test
    needs: [authorize, verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-mac:
    name: Build macOS (${{ matrix.arch }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            runner: macos-14
          - arch: x64
            target: x86_64-apple-darwin
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm install -g pnpm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      # Import certificate manually to work around macOS 14+ keychain API changes.
      # The Tauri CLI's built-in import uses flags incompatible with newer macOS.
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured — build will be unsigned"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing identity only — certificate is already in keychain from above
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Apple notarization (optional — skip to produce un-notarized builds)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tasuki ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            See the full changelog: https://github.com/${{ github.repository }}/compare/.../${{ github.ref_name }}

            ## Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (arm64) | `.dmg` |
            | macOS | Intel (x64) | `.dmg` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
