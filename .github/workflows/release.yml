name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.4)"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  # Gate: only maintainers (write access or above) can trigger a release
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    steps:
      - name: Check actor permission
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.actor }}

  verify-version:
    name: Verify version consistency
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Check versions match tag
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          TAG="${TAG_NAME#v}"
          PKG=$(jq -r '.version' package.json)
          TAURI=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)

          echo "Tag:              $TAG"
          echo "package.json:     $PKG"
          echo "tauri.conf.json:  $TAURI"
          echo "Cargo.toml:       $CARGO"

          MISMATCH=0
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG)"
            MISMATCH=1
          fi
          if [ "$TAURI" != "$TAG" ]; then
            echo "::error::tauri.conf.json version ($TAURI) does not match tag ($TAG)"
            MISMATCH=1
          fi
          if [ "$CARGO" != "$TAG" ]; then
            echo "::error::Cargo.toml version ($CARGO) does not match tag ($TAG)"
            MISMATCH=1
          fi

          if [ "$MISMATCH" -eq 1 ]; then
            echo "::error::Version mismatch detected. Run the 'Version Bump' workflow first."
            exit 1
          fi
          echo "All versions match tag v$TAG"

  test:
    name: Lint & Test
    needs: [authorize, verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  create-release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
          PREV_TAG: ${{ steps.notes.outputs.prev_tag }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            gh release create "$TAG_NAME" \
              --title "Tasuki $TAG_NAME" \
              --generate-notes \
              --notes-start-tag "$PREV_TAG" \
              --draft
          else
            gh release create "$TAG_NAME" \
              --title "Tasuki $TAG_NAME" \
              --generate-notes \
              --draft
          fi
