version: 2

updates:
  # ── npm (frontend + devDependencies) ──
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      # minor/patch は種別ごとにまとめて 1 PR にする
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # セキュリティアップデートもグルーピング（即時作成される）
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ── Cargo (Tauri / Rust) ──
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ── GitHub Actions ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
